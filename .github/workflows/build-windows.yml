name: Build Windows App

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Generate Windows scaffold
        run: flutter create --platforms=windows .

      - name: Require administrator (UAC) for VPN tun
        shell: pwsh
        run: |
          $m = "windows\runner\runner.exe.manifest"
          $c = Get-Content $m -Raw
          # Шаблон манифеста Flutter НЕ содержит requestedExecutionLevel, поэтому
          # простой -replace ничего не находил и .exe собирался без прав админа.
          # Если блок уже есть — меняем уровень, иначе вставляем trustInfo (одной
          # строкой, чтобы не ломать YAML-отступы блок-скаляра).
          if ($c -match 'requestedExecutionLevel') {
            $c = $c -replace 'level="asInvoker"', 'level="requireAdministrator"'
          } else {
            $trust = '<trustInfo xmlns="urn:schemas-microsoft-com:asm.v3"><security><requestedPrivileges><requestedExecutionLevel level="requireAdministrator" uiAccess="false" /></requestedPrivileges></security></trustInfo></assembly>'
            $c = $c -replace '</assembly>', $trust
          }
          Set-Content $m -Value $c -Encoding UTF8
          Write-Host "=== runner.exe.manifest after patch ==="
          Get-Content $m
          if (-not (Select-String -Path $m -Pattern "requireAdministrator")) {
            Write-Error "UAC manifest patch FAILED - requireAdministrator missing"
            exit 1
          }

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Download sing-box for Windows
        shell: pwsh
        run: |
          $ver = "1.10.7"
          $url = "https://github.com/SagerNet/sing-box/releases/download/v$ver/sing-box-$ver-windows-amd64.zip"
          $dest = "build\windows\x64\runner\Release"
          Invoke-WebRequest -Uri $url -OutFile singbox.zip
          Expand-Archive -Path singbox.zip -DestinationPath singbox_tmp
          Copy-Item "singbox_tmp\sing-box-$ver-windows-amd64\sing-box.exe" -Destination "$dest\sing-box.exe"
          Remove-Item singbox.zip, singbox_tmp -Recurse

      - name: Package build
        shell: pwsh
        run: |
          $src = "build\windows\x64\runner\Release"
          $zip = "combitone-vpn-windows.zip"
          Compress-Archive -Path "$src\*" -DestinationPath $zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: combitone-vpn-windows
          path: combitone-vpn-windows.zip
          retention-days: 30
