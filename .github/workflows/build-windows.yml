name: Build Windows App

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Generate Windows scaffold
        run: flutter create --platforms=windows .

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Download sing-box for Windows
        shell: pwsh
        run: |
          $ver = "1.10.7"
          $url = "https://github.com/SagerNet/sing-box/releases/download/v$ver/sing-box-$ver-windows-amd64.zip"
          $dest = "build\windows\x64\runner\Release"
          Invoke-WebRequest -Uri $url -OutFile singbox.zip
          Expand-Archive -Path singbox.zip -DestinationPath singbox_tmp
          Copy-Item "singbox_tmp\sing-box-$ver-windows-amd64\sing-box.exe" -Destination "$dest\sing-box.exe"
          Remove-Item singbox.zip, singbox_tmp -Recurse

      - name: Package build
        shell: pwsh
        run: |
          $src = "build\windows\x64\runner\Release"
          $zip = "combitone-vpn-windows.zip"
          Compress-Archive -Path "$src\*" -DestinationPath $zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: combitone-vpn-windows
          path: combitone-vpn-windows.zip
          retention-days: 30
